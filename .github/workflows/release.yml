name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.0). Leave empty to use short commit ID."
        type: string
        default: ""
      draft:
        description: "Create as draft release"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            pack_script: pack:mac
          - name: windows
            os: windows-latest
            pack_script: pack:win
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_SHA:0:7}"
          fi
          echo "Setting version to ${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          npm pkg set version="${VERSION}"

      - name: Disable code signing and notarization
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const f = 'electron-builder.config.cjs';
            let c = fs.readFileSync(f, 'utf8');
            c = c.replace(/hardenedRuntime:\s*true/g, 'hardenedRuntime: false');
            c = c.replace(/notarize:\s*true/g, 'notarize: false');
            fs.writeFileSync(f, c);
            console.log('Patched electron-builder.config.cjs: disabled hardenedRuntime + notarize');
          "

      - name: Build package
        env:
          ELECTRON_BUILDER_PUBLISH: "never"
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.pack_script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: netcatty-${{ matrix.name }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.msi
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore

  release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      actions: read
    env:
      # download-artifact@v6 and softprops/action-gh-release@v2 still target
      # Node 20; force Node 24 until upstream releases Node 24 native versions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Determine version and tag
        id: meta
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            VERSION="${GITHUB_SHA:0:7}"
            TAG="v0.0.0-${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}, Tag: ${TAG}"

      - name: Generate release notes
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="${{ steps.meta.outputs.tag }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          cat > release_notes.md << EOF
          ## Download

          | OS | Architecture | Download |
          | :--- | :--- | :--- |
          | **Windows** | x64 | [Netcatty-${VERSION}-win-x64.exe](${BASE}/Netcatty-${VERSION}-win-x64.exe) |
          | **Windows** | arm64 | [Netcatty-${VERSION}-win-arm64.exe](${BASE}/Netcatty-${VERSION}-win-arm64.exe) |
          | **macOS** | Apple Silicon | [Netcatty-${VERSION}-mac-arm64.dmg](${BASE}/Netcatty-${VERSION}-mac-arm64.dmg) |
          | **macOS** | Intel | [Netcatty-${VERSION}-mac-x64.dmg](${BASE}/Netcatty-${VERSION}-mac-x64.dmg) |
          EOF

          echo "Generated release_notes.md"
          cat release_notes.md

      - name: Create or update tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Netcatty ${{ steps.meta.outputs.version }}
          body_path: release_notes.md
          draft: ${{ inputs.draft || false }}
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.msi
            artifacts/*.yml
            artifacts/*.blockmap
          generate_release_notes: true
          fail_on_unmatched_files: false
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
